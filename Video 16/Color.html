<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About all Colors properties | Aryan Singh</title>
</head>
<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <!-- Title -->
    <title>About Colors | Aryan Singh</title>

    <style>
        body {
            background-color: #ffffff; /* White background */
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        /* COLOR BY NAME */
        .red {
            color: red; /* Direct color name */
        }

        /* HEX COLOR */
        .hex {
            color: #3498db; /* Hex code color */
        }

        /* RGB COLOR */
        .rgb {
            color: rgb(255, 0, 0); /* Red using RGB */
        }

        /* RGBA COLOR */
        .rgba {
            color: rgba(0, 0, 255, 0.5); /* Blue with transparency */
        }

        /* BACKGROUND COLOR */
        .bg {
            background-color: yellow; /* Background color */
            padding: 10px;
        }

        /* BORDER COLOR */
        .border {
            border: 2px solid green; /* Border with color */
            padding: 10px;
        }

        /* GRADIENT */
        .gradient {
            background: linear-gradient(to right, red, yellow); /* Gradient */
            padding: 10px;
        }

    </style>
</head>
<body>

    <h1>Color Styling Guide</h1>

    <!-- Different color types -->
    <p class="red">This is color using name</p>
    <p class="hex">This is color using HEX code</p>
    <p class="rgb">This is color using RGB</p>
    <p class="rgba">This is color using RGBA (transparent)</p>

    <!-- Background -->
    <p class="bg">This has background color</p>

    <!-- Border -->
    <p class="border">This has border color</p>

    <!-- Gradient -->
    <p class="gradient">This has gradient background</p>

</body>
</html>
</body>
</html>
