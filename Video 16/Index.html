<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Font | Aryan Singh</title>
</head>
<style>
    /* BODY: poore page ka base styling */
    body {
        font-family: Arial, sans-serif;
        /* Default font family */
        background-color: #f0f0f0;
        /* Light grey background */
        margin: 0;
        padding: 20px;
    }

    /* HEADING STYLE */
    h1 {
        font-size: 40px;
        /* Font size (bada text) */
        text-align: center;
        /* Center align */
        text-transform: uppercase;
        /* Text ko capital bana deta hai */
        letter-spacing: 2px;
        /* Letters ke beech space */
    }

    /* NORMAL PARAGRAPH */
    p {
        font-size: 18px;
        /* Text size */
        line-height: 1.6;
        /* Lines ke beech space */
        color: #333;
        /* Dark grey color */
    }

    /* FONT FAMILY EXAMPLES */
    .serif {
        font-family: "Times New Roman", serif;
        /* Serif font */
    }

    .sans {
        font-family: Arial, sans-serif;
        /* Sans-serif font */
    }

    .mono {
        font-family: "Courier New", monospace;
        /* Monospace font */
    }

    /* FONT STYLE */
    .italic {
        font-style: italic;
        /* Italic text */
    }

    /* FONT WEIGHT */
    .bold {
        font-weight: bold;
        /* Bold text */
    }

    /* TEXT DECORATION */
    .underline {
        text-decoration: underline;
        /* Underline */
    }

    /* TEXT ALIGN */
    .center {
        text-align: center;
        /* Center text */
    }

    /* COLOR */
    .colored {
        color: blue;
        /* Text ka color */
    }
</style>
<body>
    <h1>Font Styling Guide</h1>

    <!-- Different font family -->
    <p class="serif">This is Serif font (Times New Roman)</p>
    <p class="sans">This is Sans-serif font (Arial)</p>
    <p class="mono">This is Monospace font (Courier New)</p>

    <!-- Font style -->
    <p class="italic">This text is italic</p>

    <!-- Font weight -->
    <p class="bold">This text is bold</p>

    <!-- Text decoration -->
    <p class="underline">This text is underlined</p>

    <!-- Alignment -->
    <p class="center">This text is centered</p>

    <!-- Color -->
    <p class="colored">This text is blue</p>

</body>
</html>
