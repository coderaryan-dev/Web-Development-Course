<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1 - Pure HTML Media Player | Aryan Singh</title>
</head>

<body>
    <header>

        <h1>These are 6 mp3 Files</h1>

    </header>

    <main>

        <audio src="assets/1.mp3" Controls></audio>
        <audio src="assets/2.mp3" Controls></audio>
        <audio src="assets/3.mp3" Controls></audio>
        <audio src="assets/4.mp3" Controls></audio>
        <audio src="assets/5.mp3" Controls></audio>
        <audio src="assets/6.mp3" Controls></audio>
        <h1>These are 6 mp4 Files</h1>
        <video height="200" width="340" src="assets/1.mp4" Controls></video>
        <video height="200" width="340" src="assets/2.mp4" Controls></video>
        <video height="200" width="340" src="assets/3.mp4" Controls></video>
        <video height="200" width="340" src="assets/4.mp4" Controls></video>
        <video height="200" width="340" src="assets/5.mp4" Controls></video>
        <video height="200" width="340" src="assets/6.mp4" Controls></video>
    </main>
    <footer>Copyright &copy; Aryan Singh. All Rights Reserved.</footer>

</body>

</html>
