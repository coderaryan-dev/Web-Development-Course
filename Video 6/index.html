<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First quiz in this course On Forms | Aryan Singh</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <h1>Forms Quiz:-</h1>
    <form action="post">
        <div>
            <label for="Name">Enter Your Name Here-</label>
            <input type="text" name="Username" placeholder="Enter Your Username" id="Name" required>
        </div>
        <div>
            <label for="City">Enter Your City-</label>
            <input type="text" name="City" placeholder="Enter Your City Name" id="City" required>
        </div>
        <div>
            <label for="Pincode">Enter Your Pincode Here-</label>
            <input type="number" name="Pincode" id="Pincode" placeholder="Enter Your Pincode" required>
        </div>
        <div>
            <input type="submit" value="Submit">
        </div>
    </form>
</body>

</html>
